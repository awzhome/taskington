name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 0

      - name: Full Unicode check
        if: github.ref == 'refs/heads/master'
        run: buildtools/unicode-check --all

      - name: PR-based Unicode check
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/pull/')
        run: buildtools/unicode-check

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 #v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Check .NET Core version
        shell: bash
        run: |
          dotnet --version
          
      - name: Publish MacOS build
        run: buildtools/publish-macosarm64
      
      - name: Test
        shell: bash
        run: buildtools/test

#      - name: Archive artifacts
#        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #7.0.0
#        with:
#          name: Windows x64 Installer
#          path: output/Taskington-*-win64.msi

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" --draft --title "${GITHUB_REF#refs/tags/v}" output/*.exe
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
